server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Routage SPA : toute route inconnue renvoie index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy vers le backend (service "backend" sur le réseau Docker)
    location /api/ {
        proxy_pass http://backend:3001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
